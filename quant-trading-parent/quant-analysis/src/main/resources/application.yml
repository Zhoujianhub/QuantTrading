spring:
  application:
    name: quant-analysis
    
  datasource:
    url: jdbc:mysql://localhost:3306/quant_trading?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: quant
    password: quant123
    driver-class-name: com.mysql.cj.jdbc.Driver
    
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        
  data:
    redis:
      host: localhost
      port: 6379
      password: 
      database: 0

server:
  port: 8087

# Analysis module specific config
quant:
  analysis:
    executor:
      url: http://localhost:5000
      timeout: 300000
      retry-count: 3
      
    llm:
      provider: deepseek
      model: deepseek-chat
      api-key: ${DEEPSEEK_API_KEY:sk-xxxx}
      base-url: https://api.deepseek.com
      
    cache:
      report-ttl: 3600
      progress-ttl: 60
      
    analysis:
      max-stocks-per-batch: 10
      default-dimensions:
        - FUNDAMENTALS
        - MARKET
        - NEWS
        - SENTIMENT

logging:
  level:
    com.quant.analysis: INFO
