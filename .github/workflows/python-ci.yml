name: Python CI

on:
  push:
    branches: [master, main, develop]
    paths:
      - 'quant-trading-parent/quant-analysis/executor/**'
  pull_request:
    branches: [master, main, develop]
    paths:
      - 'quant-trading-parent/quant-analysis/executor/**'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: quant-trading-parent/quant-analysis/executor

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: quant-trading-parent/quant-analysis/executor/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with Ruff
        run: pip install ruff && ruff check .

      - name: Type check with mypy
        run: pip install mypy && mypy agents/ tools/ || true

      - name: Security scan with Bandit
        run: pip install bandit && bandit -r agents/ tools/ || true

      - name: Run tests
        run: pytest tests/ -v || echo "No tests found"
